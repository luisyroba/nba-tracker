<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Betting Dashboard</title>
<link rel="stylesheet" href="style.css?v=26" />
</head>
<body>
  <header>
    <h1>NBA Betting Dashboard</h1>
    <p>Calculadora de EV + registro de picks</p>
  </header>

  <main>
    <section class="card">
      <h2>Estado</h2>
      <p id="status">Cargando app...</p>
    </section>

    <section class="card">
      <h2>Partidos NBA</h2>
      <div id="games"></div>
    </section>

    <section class="card">
      <h2>Calculadora de value</h2>
      <form id="bet-form">
        <label>Partido</label>
        <input type="text" id="match" placeholder="Ej: Lakers vs Warriors" required />

        <label>Mercado</label>
        <input type="text" id="market" placeholder="Ej: Lakers ML" required />

        <label>Cuota decimal</label>
        <input type="number" id="odds" step="0.01" placeholder="Ej: 1.72" required />

        <label>Tu probabilidad estimada (%)</label>
        <input type="number" id="prob" step="0.1" placeholder="Ej: 61" required />

        <label>Stake</label>
        <input type="number" id="stake" step="0.01" placeholder="Ej: 1" required />

        <button type="submit">Guardar pick</button>
      </form>

      <div id="calc-result"></div>
    </section>

    <section class="card">
      <h2>Mis picks</h2>
      <div id="picks-list"></div>
    </section>
  </main>

  <script src="app.js?v=27"></script>
</body>
</html>

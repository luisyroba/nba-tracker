<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Pregame Scout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <svg class="header-logo" viewBox="0 0 40 40" fill="none" aria-label="NBA Scout">
          <circle cx="20" cy="20" r="19" fill="#C8102E" stroke="white" stroke-width="1.5"/>
          <path d="M20 4 C12 8 8 14 8 20 C8 26 12 32 20 36 C28 32 32 26 32 20 C32 14 28 8 20 4Z" fill="#1D428A"/>
          <ellipse cx="20" cy="20" rx="7" ry="16" fill="none" stroke="white" stroke-width="1.2"/>
          <line x1="4" y1="20" x2="36" y2="20" stroke="white" stroke-width="1.2"/>
        </svg>
        <div>
          <h1>NBA Pregame Scout</h1>
          <p>Análisis estadístico · Picks con valor</p>
        </div>
      </div>
    </div>
  </header>
  <main>
    <div class="status-bar"><span id="status">Cargando partidos...</span></div>
    <div id="games"></div>
  </main>
  <div id="game-modal" class="modal hidden" role="dialog" aria-modal="true" aria-hidden="true">
    <div id="modal-close-bg" class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <div class="modal-header-teams" id="modal-teams-header"><span>Análisis Pregame</span></div>
        <button id="modal-close" class="close-btn" aria-label="Cerrar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="analysis-panel">
          <div class="loading-state"><div class="loading-spinner"></div><p>Cargando análisis...</p></div>
        </div>
      </div>
    </div>
  </div>
<script src="app.js?v=87" defer=""></script>
</body>
</html>

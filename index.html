<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NBA Pregame Scout</title>
  <link rel="stylesheet" href="style.css?v=2"/>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <svg class="header-logo" viewBox="0 0 44 44" fill="none" aria-label="NBA Scout">
          <circle cx="22" cy="22" r="22" fill="#C8102E"/>
          <circle cx="22" cy="22" r="14" fill="none" stroke="#fff" stroke-width="2"/>
          <path d="M10 22 Q16 14 22 22 Q28 30 34 22" stroke="#fff" stroke-width="2" fill="none"/>
          <path d="M22 8 Q18 16 22 22 Q26 28 22 36" stroke="#fff" stroke-width="2" fill="none"/>
        </svg>
        <div>
          <h1>NBA Pregame Scout</h1>
          <p>Análisis y picks para apuestas</p>
          <span id="last-updated" style="font-size:12px;color:#94a3b8;"></span>
        </div>
      </div>
    </div>
  </header>
  <main>
    <div class="status-bar" id="status">Cargando partidos NBA...</div>
    <div id="games"></div>
  </main>

  <!-- Modal -->
  <div class="modal hidden" id="game-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-backdrop" id="modal-close-bg"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <div class="modal-header-teams" id="modal-teams-header">Análisis Pregame</div>
        <button class="close-btn" id="modal-close" aria-label="Cerrar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="analysis-panel">
        <div class="loading-state"><div class="loading-spinner"></div><p>Cargando...</p></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
